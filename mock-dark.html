<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLUGGED // NIGHT SHIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0B0A0A;
    --bg-panel: #1A1816;
    --text-main: #E8DFBF;
    --text-dim: #8A8575;
    --orange: #EA580C;
    --yellow: #FDE047;
    --pink: #F43F5E;
    --cyan: #2A9DCC;
    --neon-green: #39FF14;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* Extreme Noise & Halftone */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.25'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }
  
  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: -1;
    background-image: radial-gradient(var(--text-dim) 1px, transparent 1px);
    background-size: 6px 6px;
    opacity: 0.05;
  }

  h1, h2, h3, .poster {
    font-family: 'Anton', sans-serif;
    text-transform: uppercase;
  }

  .marker {
    font-family: 'Permanent Marker', cursive;
    color: var(--pink);
    text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
    position: absolute;
    z-index: 50;
    pointer-events: none;
  }

  /* Warning Marquee */
  .marquee {
    width: 100vw;
    background: var(--yellow);
    color: var(--bg-dark);
    font-family: 'Anton', sans-serif;
    font-size: 2rem;
    padding: 0.5rem 0;
    white-space: nowrap;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
    z-index: 1000;
    border-bottom: 4px solid var(--bg-dark);
    transform: rotate(-1deg);
    transform-origin: left center;
  }
  
  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
  }
  
  @keyframes scroll {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
  }

  /* Hero */
  .hero {
    height: 100vh;
    padding-top: 10vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero h1 {
    font-size: clamp(6rem, 18vw, 20rem);
    line-height: 0.8;
    color: transparent;
    -webkit-text-stroke: 2px var(--text-main);
    margin-left: -2vw;
    transform: scaleY(1.2);
  }
  
  .hero h1 span {
    color: var(--text-main);
    -webkit-text-stroke: 0;
    display: block;
    margin-left: 10vw;
  }

  .scribble-1 {
    font-size: clamp(2rem, 5vw, 4rem);
    top: 30%; right: 10%;
    transform: rotate(15deg);
    color: var(--neon-green);
  }

  .scribble-2 {
    font-size: clamp(3rem, 6vw, 5rem);
    top: 60%; left: 5%;
    transform: rotate(-10deg);
  }

  /* Tape */
  .duct-tape {
    position: absolute;
    width: 150px; height: 45px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    z-index: 40;
    mix-blend-mode: screen;
  }

  /* Products */
  .catalogue {
    padding: 10vw 5vw;
    position: relative;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10vw;
  }

  .item {
    position: relative;
    background: var(--bg-panel);
    padding: 1rem;
    border: 1px solid var(--text-dim);
  }

  .item:nth-child(1) { transform: rotate(-4deg); margin-top: 50px; }
  .item:nth-child(2) { transform: rotate(3deg); }
  .item:nth-child(3) { transform: rotate(-1deg); margin-top: 100px; }

  .item:hover {
    z-index: 100;
  }

  .item img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    filter: invert(1) contrast(150%) grayscale(50%);
    transition: 0.1s steps(3);
  }
  
  .item:hover img {
    filter: invert(0) contrast(120%);
    transform: scale(1.05);
  }

  .item-tape { top: -20px; left: 50%; transform: translateX(-50%) rotate(3deg); width: 120px; }

  .item h3 {
    font-size: 3rem;
    margin-top: 1rem;
    line-height: 1;
    color: var(--orange);
  }

  .price {
    font-size: 2rem;
    font-weight: 700;
  }
  
  .crossed-out {
    position: relative;
    display: inline-block;
  }
  .crossed-out::after {
    content: "";
    position: absolute;
    left: -10%; top: 50%;
    width: 120%; height: 4px;
    background: var(--pink);
    transform: rotate(-10deg);
  }

  .new-price {
    color: var(--neon-green);
    font-family: 'Permanent Marker', cursive;
    font-size: 3rem;
    position: absolute;
    right: 10px;
    bottom: -20px;
    transform: rotate(-15deg);
  }

  .tag-stamp {
    position: absolute;
    top: 40%; left: -20px;
    border: 4px solid var(--pink);
    color: var(--pink);
    font-family: 'Anton', sans-serif;
    font-size: 3rem;
    padding: 0.5rem;
    transform: rotate(-25deg);
    text-shadow: 2px 2px 0px rgba(0,0,0,1);
    box-shadow: inset 0 0 0 4px var(--bg-panel);
    pointer-events: none;
    opacity: 0.8;
  }

  /* Footer */
  .footer {
    border-top: 2px dashed var(--text-dim);
    padding: 5vw;
    margin-top: 10vw;
    text-align: center;
    position: relative;
  }
  
  .barcode {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    letter-spacing: -5px;
    color: var(--text-dim);
    transform: scaleY(2);
    display: inline-block;
    margin-bottom: 2rem;
  }
</style>
</head>
<body>

  <div class="marquee">
    <span>// DROP 002 LIVE // NO HIGHS NO LOWS MUST BE BOSE // BURN YOUR GAMING HEADSET // IEMs ONLY //</span>
  </div>

  <section class="hero">
    <div class="marker scribble-1">Don't buy fake shit</div>
    <h1>
      NO GATE<br>
      <span>KEEPING</span>
    </h1>
    <div class="marker scribble-2">SOUND IS RAW.</div>
    <div class="duct-tape" style="bottom: 10%; right: 20%; transform: rotate(-35deg) scale(1.5);"></div>
  </section>

  <section class="catalogue">
    <div class="marker" style="top: -50px; left: 10%; font-size: 3rem; color: var(--yellow);">Our stash:</div>
    
    <div class="grid">
      <article class="item">
        <div class="duct-tape item-tape"></div>
        <img src="https://images.unsplash.com/photo-1505236273191-1dce886b01e9?auto=format&fit=crop&w=600&q=80" alt="Red IEM">
        <h3>ZERO:RED</h3>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
          <span class="mono" style="color:var(--text-dim);">DUAL-DD</span>
          <div style="position: relative;">
            <span class="price crossed-out">$55</span>
            <span class="new-price">$49</span>
          </div>
        </div>
        <div class="tag-stamp">BASS HEAD</div>
      </article>

      <article class="item">
        <div class="duct-tape item-tape" style="transform: translateX(-50%) rotate(-5deg);"></div>
        <img src="https://images.unsplash.com/photo-1546435770-a3e426fa99ce?auto=format&fit=crop&w=600&q=80" alt="Aria IEM">
        <h3>ARIA</h3>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
          <span class="mono" style="color:var(--text-dim);">LCP-DD</span>
          <div style="position: relative;">
            <span class="new-price" style="color: var(--yellow); position: relative; bottom: auto; right: auto; transform: none;">$79</span>
          </div>
        </div>
      </article>

      <article class="item">
        <div class="duct-tape item-tape" style="transform: translateX(-50%) rotate(8deg);"></div>
        <img src="https://images.unsplash.com/photo-1608223652636-6e47f2022718?auto=format&fit=crop&w=600&q=80" alt="Wan'er IEM">
        <h3>WAN'ER</h3>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
          <span class="mono" style="color:var(--text-dim);">PET-DD</span>
          <span class="price">$25</span>
        </div>
        <div class="marker" style="font-size: 2rem; color: var(--pink); top: 50%; right: -20px; transform: rotate(15deg);">SOLD OUT BRUH</div>
      </article>
    </div>
  </section>

  <footer class="footer">
    <div class="marker" style="top: 0; left: 50%; transform: translate(-50%, -50%) rotate(-2deg); font-size: 2rem; color: var(--cyan);">Archive</div>
    <div class="barcode">||| | || |||| | ||| || |||</div>
    <p>PLUGGED // 2026</p>
  </footer>

</body>
</html>
